name: Deploy Concierge to Droplet

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            TARGET="/var/www/cem888.ai/concierge"
            mkdir -p "$TARGET"
            cd "$TARGET"

            # Clone or pull
            if [ -d .git ]; then
              git remote set-url origin git@github.com:CEM888AI/cem-concierge.git 2>/dev/null || true
              git pull origin main --no-edit
            else
              git clone git@github.com:CEM888AI/cem-concierge.git .
            fi

            # Install deps
            npm install --production

            # Restart PM2
            pm2 reload ecosystem.config.js || pm2 start ecosystem.config.js
            pm2 save

            echo "[deploy] Concierge updated at $(date)"
