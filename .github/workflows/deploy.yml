name: Deploy Concierge to Droplet

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "server.js,package.json,ecosystem.config.js"
          target: "/var/www/cem888.ai/concierge/"

      - name: Restart Concierge
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /var/www/cem888.ai/concierge
            npm install --production 2>/dev/null || true
            pm2 restart cem-concierge --update-env || pm2 start ecosystem.config.js
            pm2 save
            echo "[deploy] Concierge updated at $(date)"
